name: workflowactions
on: push
jobs:
  build:
    defaults:
      run:
        working-directory: goproject

    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: setup golang
        uses: actions/setup-go@v6
        with:
            go-version: 1.25
      - name: Run unit tests
        run: go test -v ./...
      - name: go main
        run: go run main.go 